services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: stomp_db
      MYSQL_USER: stomp
      MYSQL_PASSWORD: stomp1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ustomp", "-pstomp1234"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
